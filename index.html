<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Syne:wght@500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sage:#7C9A8E;--sage-lt:#EAF2EF;--sage-dk:#4E7A6C;
  --sky:#6B8FC9;--sky-lt:#EBF1FB;
  --rose:#C97B7B;--rose-lt:#FAEEEE;
  --amber:#C9A46B;--amber-lt:#FBF3E6;
  --plum:#9B7BC9;--plum-lt:#F2EDFB;
  --slate:#6B7B8C;--slate-lt:#EEF1F4;
  --bg:#F7F6F3;--surface:#FFFFFF;
  --border:#E4E1DA;--border2:#CEC9C0;
  --text:#1E1C18;--text2:#6B6760;--text3:#A09C95;
  --r:10px;--rlg:16px;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
  --shmd:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.05);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:radial-gradient(ellipse at 25% 25%,#E5F0EC 0%,transparent 55%),radial-gradient(ellipse at 80% 75%,#EAF0FA 0%,transparent 55%),var(--bg)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:44px 36px;width:100%;max-width:380px;text-align:center;box-shadow:var(--shmd);animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{width:52px;height:52px;background:linear-gradient(135deg,var(--sage),var(--sky));border-radius:14px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:600;color:#fff;box-shadow:0 4px 12px rgba(107,143,201,.3)}
.auth-box h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:600;margin-bottom:5px}
.auth-box p{font-size:13px;color:var(--text2);margin-bottom:26px}
.auth-box input{width:100%;font-family:inherit;font-size:15px;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;text-align:center;letter-spacing:4px;transition:border-color .2s,box-shadow .2s}
.auth-box input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt)}
.auth-btn{width:100%;font-family:inherit;font-size:14px;font-weight:600;padding:12px;border:none;border-radius:var(--r);background:linear-gradient(135deg,var(--sage),var(--sage-dk));color:#fff;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .15s;box-shadow:0 2px 10px rgba(124,154,142,.35)}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,154,142,.45)}
.auth-btn:active{transform:scale(.97)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.auth-error{font-size:12px;color:var(--rose);margin-top:10px;display:none;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* APP */
#app{display:none;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:10px}
.hdr-logo{width:34px;height:34px;flex-shrink:0;background:linear-gradient(135deg,var(--sage),var(--sky));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:#fff}
.hdr-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;flex:none}
.hdr-search{flex:1;max-width:280px;margin-left:auto;position:relative}
.hdr-search input{width:100%;font-family:inherit;font-size:13px;padding:7px 12px 7px 32px;border:1.5px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.hdr-search input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt)}
.hdr-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{font-family:inherit;font-size:13px;font-weight:500;padding:11px 18px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;white-space:nowrap}
.tab-btn.active{color:var(--sage);border-bottom-color:var(--sage)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-pane{display:none;padding:20px}
.tab-pane.active{display:block;animation:fadeUp .25s ease both}

/* PANEL HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.ph-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:600}
.ph-title span{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:400;color:var(--text3);margin-left:7px}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;font-size:11px;color:var(--text2);cursor:default;transition:box-shadow .2s,transform .2s}
.stat:hover{box-shadow:var(--sh);transform:translateY(-1px)}
.stat strong{font-family:'Syne',sans-serif;font-size:17px;font-weight:600;color:var(--text);display:block;line-height:1.2}

/* TOOLBAR */
.tb{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fb{font-family:inherit;font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .18s;white-space:nowrap}
.fb:hover{border-color:var(--sage);color:var(--sage)}
.fb.active{background:var(--sage);color:#fff;border-color:var(--sage);box-shadow:0 2px 8px rgba(124,154,142,.3)}
.tb-search{position:relative;margin-left:auto}
.tb-search input{font-family:inherit;font-size:13px;padding:7px 12px 7px 30px;border:1.5px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);outline:none;width:170px;transition:border-color .2s,box-shadow .2s,width .25s}
.tb-search input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt);width:220px}
.tb-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.addbtn{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--sage),var(--sage-dk));color:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(124,154,142,.3);white-space:nowrap}
.addbtn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,154,142,.4)}
.addbtn:active{transform:scale(.96)}

/* ── DESKTOP TABLE ── */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:11px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#FAFAF8}
td{padding:11px 14px;vertical-align:middle}
.cm{font-weight:600;font-size:13px}
.cs{color:var(--text2);font-size:11px;margin-top:2px}
.muted{font-size:12px;color:var(--text2)}
.mono{font-size:11px;color:var(--text3)}
.sm{font-size:12px;max-width:160px;line-height:1.4}
.lnk{color:var(--sky);font-size:12px;text-decoration:none;font-weight:500;transition:color .15s}
.lnk:hover{color:#4A72B0}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.acts{display:flex;gap:5px}
.ib{background:none;border:1.5px solid var(--border);border-radius:7px;padding:5px 7px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s}
.ib:hover{background:var(--sage-lt);border-color:var(--sage);color:var(--sage)}
.ib:active{transform:scale(.92)}
.ib.del:hover{background:var(--rose-lt);border-color:var(--rose);color:var(--rose)}

/* ── MOBILE CARDS (replaces table on small screens) ── */
.card-list{display:none;flex-direction:column;gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:14px;box-shadow:var(--sh);transition:box-shadow .15s}
.card:hover{box-shadow:var(--shmd)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.card-name{font-weight:600;font-size:14px}
.card-sub{color:var(--text2);font-size:12px;margin-top:2px}
.card-body{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:12px;border-top:1px solid var(--border);padding-top:10px}
.card-field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:block;margin-bottom:2px}
.card-acts{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card-acts button{flex:1;font-family:inherit;font-size:12px;font-weight:500;padding:7px;border-radius:8px;cursor:pointer;transition:all .15s}
.card-acts .edit-btn{border:1.5px solid var(--border);background:none;color:var(--text2)}
.card-acts .edit-btn:hover{border-color:var(--sage);color:var(--sage);background:var(--sage-lt)}
.card-acts .del-btn{border:1.5px solid var(--border);background:none;color:var(--text2)}
.card-acts .del-btn:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-lt)}

.loading{text-align:center;padding:52px 20px;color:var(--text3);font-size:13px}
.loading::before{content:'⟳';display:block;font-size:26px;margin-bottom:8px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:52px 20px;color:var(--text3);font-size:13px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(20,18,14,.45);backdrop-filter:blur(4px);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.ov.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--rlg) var(--rlg) 0 0;padding:24px 20px;width:100%;max-width:560px;border:1px solid var(--border);max-height:92vh;overflow-y:auto;animation:slideUp .25s ease both}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;margin-bottom:18px}
.field{margin-bottom:13px}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
input,select,textarea{width:100%;font-family:inherit;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt)}
textarea{resize:vertical;min-height:68px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.bcl{font-family:inherit;font-size:13px;font-weight:500;padding:9px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.bcl:hover{border-color:var(--border2);color:var(--text)}
.bcl:active{transform:scale(.97)}
.bsv{font-family:inherit;font-size:13px;font-weight:600;padding:9px 20px;border-radius:var(--r);border:none;background:linear-gradient(135deg,var(--sage),var(--sage-dk));color:#fff;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(124,154,142,.3)}
.bsv:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,154,142,.4)}
.bsv:active{transform:scale(.97)}
.bsv:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--r);opacity:0;transition:opacity .25s,transform .25s;z-index:200;pointer-events:none;box-shadow:var(--shmd);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media(min-width:769px){
  .ov{align-items:center;padding:20px}
  .modal{border-radius:var(--rlg);max-height:88vh}
}
@media(max-width:768px){
  .hdr-search{display:none}
  .tbl-wrap{display:none}
  .card-list{display:flex}
  .tb-search input{width:140px}
  .tb-search input:focus{width:180px}
  .r2{grid-template-columns:1fr}
  .stats .stat:nth-child(n+4){display:none}
  .tab-pane{padding:14px}
  .hdr{padding:10px 14px}
  .tabs{padding:0 14px}
  .addbtn{font-size:12px;padding:7px 13px}
}
@media(max-width:480px){
  .ph{flex-direction:column}
  .auth-box{padding:32px 22px}
  .fb{font-size:11px;padding:4px 10px}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">JP</div>
    <h1>Job Pipeline</h1>
    <p>Enter your password to continue</p>
    <input type="password" id="pwd-input" placeholder="••••••••">
    <button class="auth-btn" id="auth-btn" onclick="checkAuth()">Access →</button>
    <div class="auth-error" id="auth-error">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <div class="hdr-logo">JP</div>
    <div class="hdr-title">Job Pipeline</div>
    <div class="hdr-search">
      <span class="si">⌕</span>
      <input placeholder="Search anything..." id="global-search" oninput="onGlobalSearch(this.value)">
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pipeline',this)">Applications</button>
    <button class="tab-btn" onclick="switchTab('companies',this)">Companies</button>
  </div>

  <!-- PIPELINE -->
  <div id="tab-pipeline" class="tab-pane active">
    <div class="ph">
      <div class="ph-title">Applications <span id="total-label">0 roles</span></div>
      <div class="stats">
        <div class="stat"><strong id="st-active">0</strong>Active</div>
        <div class="stat"><strong id="st-interview">0</strong>Interviews</div>
        <div class="stat"><strong id="st-offer">0</strong>Offers</div>
        <div class="stat"><strong id="st-week">0</strong>This week</div>
      </div>
    </div>
    <div class="tb">
      <button class="fb active" onclick="setFilter('all',this,'p')">All</button>
      <button class="fb" onclick="setFilter('Applied',this,'p')">Applied</button>
      <button class="fb" onclick="setFilter('Screening',this,'p')">Screening</button>
      <button class="fb" onclick="setFilter('Interview',this,'p')">Interview</button>
      <button class="fb" onclick="setFilter('Offer',this,'p')">Offer</button>
      <button class="fb" onclick="setFilter('Rejected',this,'p')">Rejected</button>
      <button class="fb" onclick="setFilter('No answer',this,'p')">No answer</button>
      <div class="tb-search"><span class="si">⌕</span><input placeholder="Search..." id="pipeline-search" oninput="renderPipeline()"></div>
      <button class="addbtn" onclick="openPipelineModal()">+ Add</button>
    </div>
    <!-- desktop table -->
    <div class="tbl-wrap" id="pipeline-table"></div>
    <!-- mobile cards -->
    <div class="card-list" id="pipeline-cards"></div>
  </div>

  <!-- COMPANIES -->
  <div id="tab-companies" class="tab-pane">
    <div class="ph">
      <div class="ph-title">Companies <span id="companies-label">0 companies</span></div>
      <div class="stats">
        <div class="stat"><strong id="sc-interesting">0</strong>Interesting</div>
        <div class="stat"><strong id="sc-contacted">0</strong>Contacted</div>
        <div class="stat"><strong id="sc-watch">0</strong>Watch</div>
      </div>
    </div>
    <div class="tb">
      <button class="fb active" onclick="setFilter('all',this,'c')">All</button>
      <button class="fb" onclick="setFilter('Interesting',this,'c')">Interesting</button>
      <button class="fb" onclick="setFilter('Watch',this,'c')">Watch</button>
      <button class="fb" onclick="setFilter('Contacted',this,'c')">Contacted</button>
      <button class="fb" onclick="setFilter('Discarded',this,'c')">Discarded</button>
      <div class="tb-search"><span class="si">⌕</span><input placeholder="Search..." id="company-search" oninput="renderCompanies()"></div>
      <button class="addbtn" onclick="openCompanyModal()">+ Add</button>
    </div>
    <div class="tbl-wrap" id="companies-table"></div>
    <div class="card-list" id="companies-cards"></div>
  </div>
</div>

<!-- PIPELINE MODAL -->
<div class="ov" id="pipeline-ov" onclick="closeIfOutside(event,'pipeline-ov')">
  <div class="modal">
    <h3 id="pm-title">Add role</h3>
    <div class="r2">
      <div class="field"><label>Company *</label><input id="pf-company" placeholder="e.g. Salesforce"></div>
      <div class="field"><label>Role *</label><input id="pf-role" placeholder="e.g. Engagement Manager"></div>
    </div>
    <div class="r2">
      <div class="field"><label>Status</label><select id="pf-status"><option>Applied</option><option>Screening</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>No answer</option></select></div>
      <div class="field"><label>Channel</label><select id="pf-channel"><option>LinkedIn</option><option>Recruiter</option><option>Direct</option><option>Referral</option><option>Job board</option><option>Other</option></select></div>
    </div>
    <div class="r2">
      <div class="field"><label>Date applied</label><input type="date" id="pf-date"></div>
      <div class="field"><label>Salary band</label><input id="pf-salary" placeholder="e.g. 70–80k"></div>
    </div>
    <div class="r2">
      <div class="field"><label>Recruiter name</label><input id="pf-rname" placeholder="e.g. Sarah Johnson"></div>
      <div class="field"><label>Recruiter contact</label><input id="pf-rcontact" placeholder="email or LinkedIn"></div>
    </div>
    <div class="field"><label>Next step</label><input id="pf-next" placeholder="e.g. Follow up Friday"></div>
    <div class="field"><label>Notes</label><textarea id="pf-notes" placeholder="Impressions, links, context..."></textarea></div>
    <div class="mf">
      <button class="bcl" onclick="closeModal('pipeline-ov')">Cancel</button>
      <button class="bsv" id="p-save-btn" onclick="savePipelineEntry()">Save</button>
    </div>
  </div>
</div>

<!-- COMPANY MODAL -->
<div class="ov" id="company-ov" onclick="closeIfOutside(event,'company-ov')">
  <div class="modal">
    <h3 id="cm-title">Add company</h3>
    <div class="r2">
      <div class="field"><label>Company *</label><input id="cf-company" placeholder="e.g. HubSpot"></div>
      <div class="field"><label>Sector</label><input id="cf-sector" placeholder="e.g. CRM / Martech"></div>
    </div>
    <div class="r2">
      <div class="field"><label>Revenue</label><input id="cf-revenue" placeholder="e.g. $2.6B"></div>
      <div class="field"><label>Employees</label><input id="cf-employees" placeholder="e.g. 7400"></div>
    </div>
    <div class="r2">
      <div class="field"><label>EMEA Presence</label><input id="cf-emea" placeholder="e.g. Madrid / Dublin"></div>
      <div class="field"><label>Status</label><select id="cf-status"><option value=""></option><option>Interesting</option><option>Watch</option><option>Contacted</option><option>Discarded</option></select></div>
    </div>
    <div class="field"><label>Jobs URL</label><input id="cf-jobs" placeholder="https://..."></div>
    <div class="field"><label>Notes</label><textarea id="cf-notes" placeholder="Context, contacts, open roles..."></textarea></div>
    <div class="mf">
      <button class="bcl" onclick="closeModal('company-ov')">Cancel</button>
      <button class="bsv" id="c-save-btn" onclick="saveCompanyEntry()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const W='https://jc-pipeline.jcarloscsva.workers.dev';
let PD=[],CD=[],pEditId=null,cEditId=null,pFilter='all',cFilter='all';
let pSortK='Date Applied',pSortD=-1,cSortK='Revenue',cSortD=-1,gSearch='';

const PS={Applied:{bg:'var(--sky-lt)',c:'var(--sky)'},Screening:{bg:'var(--amber-lt)',c:'var(--amber)'},Interview:{bg:'var(--sage-lt)',c:'var(--sage)'},Offer:{bg:'var(--plum-lt)',c:'var(--plum)'},Rejected:{bg:'var(--rose-lt)',c:'var(--rose)'},'No answer':{bg:'var(--slate-lt)',c:'var(--slate)'}};
const CS={Interesting:{bg:'var(--sky-lt)',c:'var(--sky)'},Watch:{bg:'var(--amber-lt)',c:'var(--amber)'},Contacted:{bg:'var(--sage-lt)',c:'var(--sage)'},Discarded:{bg:'var(--rose-lt)',c:'var(--rose)'}};

async function checkAuth(){
  const v=document.getElementById('pwd-input').value.trim();if(!v)return;
  const b=document.getElementById('auth-btn');b.disabled=true;b.textContent='Checking...';
  try{const r=await fetch(`${W}/api/config`);const d=await r.json();
    if(d.records?.[0]?.fields['Value']===v){
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='block';
      loadPipeline();loadCompanies();
    }else{const e=document.getElementById('auth-error');e.style.display='block';e.style.animation='none';requestAnimationFrame(()=>{e.style.animation='';});document.getElementById('pwd-input').value='';document.getElementById('pwd-input').focus();}
  }catch(e){document.getElementById('auth-error').textContent='Connection error.';document.getElementById('auth-error').style.display='block';}
  b.disabled=false;b.textContent='Access →';
}

function onGlobalSearch(v){gSearch=v.toLowerCase();renderPipeline();renderCompanies();}
function switchTab(t,b){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+t).classList.add('active');}

async function loadPipeline(){
  document.getElementById('pipeline-table').innerHTML='<div class="loading"></div>';
  document.getElementById('pipeline-cards').innerHTML='';
  try{let all=[],off=null;do{const r=await fetch(`${W}/api/records?pageSize=100`+(off?'&offset='+off:''));const d=await r.json();all=all.concat(d.records||[]);off=d.offset;}while(off);
    PD=all.map(r=>({id:r.id,...r.fields}));renderPipeline();
  }catch(e){document.getElementById('pipeline-table').innerHTML='<div class="empty">Error loading data.</div>';}
}

function renderPipeline(){
  const ls=(document.getElementById('pipeline-search')?.value||'').toLowerCase();
  const q=gSearch||ls;
  let rows=[...PD];
  if(pFilter!=='all')rows=rows.filter(r=>r['Status']===pFilter);
  if(q)rows=rows.filter(r=>(r['Company']||'').toLowerCase().includes(q)||(r['Role']||'').toLowerCase().includes(q)||(r['Recruiter Name']||'').toLowerCase().includes(q)||(r['Notes']||'').toLowerCase().includes(q));
  rows.sort((a,b)=>{let av=a[pSortK]||'',bv=b[pSortK]||'';return av<bv?pSortD:av>bv?-pSortD:0;});
  // Desktop table
  const tbl=document.getElementById('pipeline-table');
  const cards=document.getElementById('pipeline-cards');
  if(!rows.length){tbl.innerHTML='<div class="empty">No applications found.</div>';cards.innerHTML='<div class="empty">No applications found.</div>';updatePipelineStats();return;}
  tbl.innerHTML=`<table><thead><tr>
    <th onclick="sp('Company')">Company</th>
    <th onclick="sp('Status')">Status</th>
    <th onclick="sp('Channel')">Channel</th>
    <th onclick="sp('Date Applied')">Date</th>
    <th>Recruiter</th>
    <th onclick="sp('Next Step')">Next step</th>
    <th></th>
  </tr></thead><tbody>${rows.map(r=>{
    const s=PS[r['Status']]||PS['Applied'];
    const dt=r['Date Applied']?new Date(r['Date Applied']+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
    return`<tr><td><div class="cm">${e(r['Company']||'')}</div><div class="cs">${e(r['Role']||'')}${r['Salary Band']?' · '+e(r['Salary Band']):''}</div></td>
    <td><span class="badge" style="background:${s.bg};color:${s.c}">${e(r['Status']||'')}</span></td>
    <td><span class="muted">${e(r['Channel']||'')}</span></td>
    <td><span class="mono">${dt}</span></td>
    <td><div class="cm" style="font-size:12px">${e(r['Recruiter Name']||'')}</div><div class="cs">${e(r['Recruiter Contact']||'')}</div></td>
    <td><span class="sm">${e(r['Next Step']||'')}</span></td>
    <td><div class="acts"><button class="ib" onclick="openPipelineModal('${r.id}')">✎</button><button class="ib del" onclick="delP('${r.id}')">✕</button></div></td></tr>`;
  }).join('')}</tbody></table>`;
  // Mobile cards
  cards.innerHTML=rows.map(r=>{
    const s=PS[r['Status']]||PS['Applied'];
    const dt=r['Date Applied']?new Date(r['Date Applied']+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
    return`<div class="card">
      <div class="card-top">
        <div><div class="card-name">${e(r['Company']||'')}</div><div class="card-sub">${e(r['Role']||'')}${r['Salary Band']?' · '+e(r['Salary Band']):''}</div></div>
        <span class="badge" style="background:${s.bg};color:${s.c}">${e(r['Status']||'')}</span>
      </div>
      <div class="card-body">
        <div class="card-field"><label>Channel</label>${e(r['Channel']||'—')}</div>
        <div class="card-field"><label>Date</label>${dt||'—'}</div>
        <div class="card-field"><label>Recruiter</label>${e(r['Recruiter Name']||'—')}</div>
        <div class="card-field"><label>Next step</label>${e(r['Next Step']||'—')}</div>
      </div>
      <div class="card-acts">
        <button class="edit-btn" onclick="openPipelineModal('${r.id}')">Edit</button>
        <button class="del-btn" onclick="delP('${r.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
  updatePipelineStats();
}

function updatePipelineStats(){
  const now=new Date(),wa=new Date(now-7*86400000);
  document.getElementById('total-label').textContent=PD.length+' role'+(PD.length!==1?'s':'');
  document.getElementById('st-active').textContent=PD.filter(r=>!['Rejected','No answer'].includes(r['Status'])).length;
  document.getElementById('st-interview').textContent=PD.filter(r=>r['Status']==='Interview').length;
  document.getElementById('st-offer').textContent=PD.filter(r=>r['Status']==='Offer').length;
  document.getElementById('st-week').textContent=PD.filter(r=>r['Date Applied']&&new Date(r['Date Applied'])>=wa).length;
}

async function loadCompanies(){
  document.getElementById('companies-table').innerHTML='<div class="loading"></div>';
  document.getElementById('companies-cards').innerHTML='';
  try{let all=[],off=null;do{const r=await fetch(`${W}/api/companies?pageSize=100`+(off?'&offset='+off:''));const d=await r.json();all=all.concat(d.records||[]);off=d.offset;}while(off);
    CD=all.map(r=>({id:r.id,...r.fields}));renderCompanies();
  }catch(e){document.getElementById('companies-table').innerHTML='<div class="empty">Error loading companies.</div>';}
}

function renderCompanies(){
  const ls=(document.getElementById('company-search')?.value||'').toLowerCase();
  const q=gSearch||ls;
  let rows=[...CD];
  if(cFilter!=='all')rows=rows.filter(r=>r['Status']===cFilter);
  if(q)rows=rows.filter(r=>(r['Company']||'').toLowerCase().includes(q)||(r['Sector']||'').toLowerCase().includes(q)||(r['EMEA Presence']||'').toLowerCase().includes(q)||(r['Notes']||'').toLowerCase().includes(q));
  rows.sort((a,b)=>{let av=a[cSortK]||'',bv=b[cSortK]||'';return av<bv?cSortD:av>bv?-cSortD:0;});
  const tbl=document.getElementById('companies-table');
  const cards=document.getElementById('companies-cards');
  if(!rows.length){tbl.innerHTML='<div class="empty">No companies found.</div>';cards.innerHTML='<div class="empty">No companies found.</div>';updateCompaniesStats();return;}
  tbl.innerHTML=`<table><thead><tr>
    <th onclick="sc('Company')">Company</th>
    <th onclick="sc('Sector')">Sector</th>
    <th onclick="sc('Revenue')">Revenue</th>
    <th onclick="sc('Employees')">Employees</th>
    <th onclick="sc('EMEA Presence')">EMEA</th>
    <th onclick="sc('Status')">Status</th>
    <th></th>
  </tr></thead><tbody>${rows.map(r=>{
    const s=CS[r['Status']]||null;
    const badge=s?`<span class="badge" style="background:${s.bg};color:${s.c}">${e(r['Status'])}</span>`:'<span class="muted">—</span>';
    const lnk=r['Jobs URL']?`<a href="${e(r['Jobs URL'])}" target="_blank" class="lnk">Jobs ↗</a>`:'';
    return`<tr><td><div class="cm">${e(r['Company']||'')}</div>${lnk?'<div class="cs">'+lnk+'</div>':''}</td>
    <td><span class="muted">${e(r['Sector']||'')}</span></td>
    <td><span class="mono">${e(r['Revenue']||'')}</span></td>
    <td><span class="muted">${e(r['Employees']||'')}</span></td>
    <td><span class="muted">${e(r['EMEA Presence']||'')}</span></td>
    <td>${badge}</td>
    <td><div class="acts"><button class="ib" onclick="openCompanyModal('${r.id}')">✎</button><button class="ib del" onclick="delC('${r.id}')">✕</button></div></td></tr>`;
  }).join('')}</tbody></table>`;
  // Mobile cards
  cards.innerHTML=rows.map(r=>{
    const s=CS[r['Status']]||null;
    const badge=s?`<span class="badge" style="background:${s.bg};color:${s.c}">${e(r['Status'])}</span>`:'';
    const lnk=r['Jobs URL']?`<a href="${e(r['Jobs URL'])}" target="_blank" class="lnk">Jobs ↗</a>`:'';
    return`<div class="card">
      <div class="card-top">
        <div><div class="card-name">${e(r['Company']||'')}${lnk?' '+lnk:''}</div><div class="card-sub">${e(r['Sector']||'')}</div></div>
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-field"><label>Revenue</label>${e(r['Revenue']||'—')}</div>
        <div class="card-field"><label>Employees</label>${e(r['Employees']||'—')}</div>
        <div class="card-field" style="grid-column:1/-1"><label>EMEA</label>${e(r['EMEA Presence']||'—')}</div>
      </div>
      <div class="card-acts">
        <button class="edit-btn" onclick="openCompanyModal('${r.id}')">Edit</button>
        <button class="del-btn" onclick="delC('${r.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
  updateCompaniesStats();
}

function updateCompaniesStats(){
  document.getElementById('companies-label').textContent=CD.length+' companies';
  document.getElementById('sc-interesting').textContent=CD.filter(r=>r['Status']==='Interesting').length;
  document.getElementById('sc-contacted').textContent=CD.filter(r=>r['Status']==='Contacted').length;
  document.getElementById('sc-watch').textContent=CD.filter(r=>r['Status']==='Watch').length;
}

function setFilter(f,b,t){
  if(t==='p'){pFilter=f;document.querySelectorAll('#tab-pipeline .fb').forEach(x=>x.classList.remove('active'));renderPipeline();}
  else{cFilter=f;document.querySelectorAll('#tab-companies .fb').forEach(x=>x.classList.remove('active'));renderCompanies();}
  b.classList.add('active');
}
function sp(k){if(pSortK===k)pSortD*=-1;else{pSortK=k;pSortD=1;}renderPipeline();}
function sc(k){if(cSortK===k)cSortD*=-1;else{cSortK=k;cSortD=1;}renderCompanies();}

function openPipelineModal(id){
  pEditId=id||null;
  document.getElementById('pm-title').textContent=pEditId?'Edit role':'Add role';
  if(pEditId){const r=PD.find(x=>x.id===pEditId);
    document.getElementById('pf-company').value=r['Company']||'';document.getElementById('pf-role').value=r['Role']||'';
    document.getElementById('pf-status').value=r['Status']||'Applied';document.getElementById('pf-channel').value=r['Channel']||'LinkedIn';
    document.getElementById('pf-date').value=r['Date Applied']||'';document.getElementById('pf-salary').value=r['Salary Band']||'';
    document.getElementById('pf-rname').value=r['Recruiter Name']||'';document.getElementById('pf-rcontact').value=r['Recruiter Contact']||'';
    document.getElementById('pf-next').value=r['Next Step']||'';document.getElementById('pf-notes').value=r['Notes']||'';
  }else{['pf-company','pf-role','pf-salary','pf-rname','pf-rcontact','pf-next','pf-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('pf-status').value='Applied';document.getElementById('pf-channel').value='LinkedIn';
    document.getElementById('pf-date').value=new Date().toISOString().split('T')[0];}
  document.getElementById('pipeline-ov').classList.add('open');
  setTimeout(()=>document.getElementById('pf-company').focus(),80);
}

async function savePipelineEntry(){
  const co=document.getElementById('pf-company').value.trim(),ro=document.getElementById('pf-role').value.trim();
  if(!co||!ro){alert('Company and role are required.');return;}
  const fields={'Company':co,'Role':ro,'Status':document.getElementById('pf-status').value,'Channel':document.getElementById('pf-channel').value,'Date Applied':document.getElementById('pf-date').value||null,'Salary Band':document.getElementById('pf-salary').value.trim(),'Recruiter Name':document.getElementById('pf-rname').value.trim(),'Recruiter Contact':document.getElementById('pf-rcontact').value.trim(),'Next Step':document.getElementById('pf-next').value.trim(),'Notes':document.getElementById('pf-notes').value.trim()};
  const b=document.getElementById('p-save-btn');b.disabled=true;b.textContent='Saving...';
  try{if(pEditId){const r=await fetch(`${W}/api/records/${pEditId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});const d=await r.json();const i=PD.findIndex(x=>x.id===pEditId);PD[i]={id:pEditId,...d.fields};}
  else{const r=await fetch(`${W}/api/records`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});const d=await r.json();PD.unshift({id:d.id,...d.fields});}
  renderPipeline();closeModal('pipeline-ov');toast(pEditId?'Entry updated ✓':'Role added ✓');}catch(e){alert('Error saving.');}
  b.disabled=false;b.textContent='Save';
}

async function delP(id){if(!confirm('Remove this entry?'))return;try{await fetch(`${W}/api/records/${id}`,{method:'DELETE'});PD=PD.filter(x=>x.id!==id);renderPipeline();toast('Entry removed');}catch(e){alert('Error.');}}

function openCompanyModal(id){
  cEditId=id||null;
  document.getElementById('cm-title').textContent=cEditId?'Edit company':'Add company';
  if(cEditId){const r=CD.find(x=>x.id===cEditId);
    document.getElementById('cf-company').value=r['Company']||'';document.getElementById('cf-sector').value=r['Sector']||'';
    document.getElementById('cf-revenue').value=r['Revenue']||'';document.getElementById('cf-employees').value=r['Employees']||'';
    document.getElementById('cf-emea').value=r['EMEA Presence']||'';document.getElementById('cf-status').value=r['Status']||'';
    document.getElementById('cf-jobs').value=r['Jobs URL']||'';document.getElementById('cf-notes').value=r['Notes']||'';
  }else{['cf-company','cf-sector','cf-revenue','cf-employees','cf-emea','cf-jobs','cf-notes'].forEach(i=>document.getElementById(i).value='');document.getElementById('cf-status').value='';}
  document.getElementById('company-ov').classList.add('open');
  setTimeout(()=>document.getElementById('cf-company').focus(),80);
}

async function saveCompanyEntry(){
  const co=document.getElementById('cf-company').value.trim();if(!co){alert('Company name is required.');return;}
  const fields={'Company':co,'Sector':document.getElementById('cf-sector').value.trim(),'Revenue':document.getElementById('cf-revenue').value.trim(),'Employees':document.getElementById('cf-employees').value.trim(),'EMEA Presence':document.getElementById('cf-emea').value.trim(),'Status':document.getElementById('cf-status').value,'Jobs URL':document.getElementById('cf-jobs').value.trim(),'Notes':document.getElementById('cf-notes').value.trim()};
  const b=document.getElementById('c-save-btn');b.disabled=true;b.textContent='Saving...';
  try{if(cEditId){const r=await fetch(`${W}/api/companies/${cEditId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});const d=await r.json();const i=CD.findIndex(x=>x.id===cEditId);CD[i]={id:cEditId,...d.fields};}
  else{const r=await fetch(`${W}/api/companies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});const d=await r.json();CD.unshift({id:d.id,...d.fields});}
  renderCompanies();closeModal('company-ov');toast(cEditId?'Company updated ✓':'Company added ✓');}catch(e){alert('Error saving.');}
  b.disabled=false;b.textContent='Save';
}

async function delC(id){if(!confirm('Remove this company?'))return;try{await fetch(`${W}/api/companies/${id}`,{method:'DELETE'});CD=CD.filter(x=>x.id!==id);renderCompanies();toast('Company removed');}catch(e){alert('Error.');}}

function closeModal(id){document.getElementById(id).classList.remove('open');pEditId=null;cEditId=null;}
function closeIfOutside(ev,id){if(ev.target===document.getElementById(id))closeModal(id);}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape'){closeModal('pipeline-ov');closeModal('company-ov');}});
document.getElementById('pwd-input').addEventListener('keydown',ev=>{if(ev.key==='Enter')checkAuth();});
</script>
</body>
</html>
