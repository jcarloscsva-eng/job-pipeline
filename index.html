<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sage:    #7C9A8E;
  --sage-lt: #EAF2EF;
  --sage-md: #C4DBD4;
  --rose:    #C97B7B;
  --rose-lt: #FAEEEE;
  --amber:   #C9A46B;
  --amber-lt:#FBF3E6;
  --sky:     #6B8FC9;
  --sky-lt:  #EBF1FB;
  --plum:    #9B7BC9;
  --plum-lt: #F2EDFB;
  --slate:   #6B7B8C;
  --slate-lt:#EEF1F4;

  --bg:      #F7F6F3;
  --surface: #FFFFFF;
  --border:  #E4E1DA;
  --border2: #D0CCC3;
  --text:    #1E1C18;
  --text2:   #6B6760;
  --text3:   #A09C95;

  --radius:  10px;
  --radius-lg: 16px;
  --shadow:  0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
}

/* ── AUTH ── */
#auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
  background: radial-gradient(ellipse at 30% 20%, #E8F5F0 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, #EBF1FB 0%, transparent 60%),
              var(--bg);
}
.auth-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:48px 40px;
  width:100%;max-width:380px;
  text-align:center;
  box-shadow:var(--shadow-md);
  animation: fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.auth-logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--sage),var(--sky));
  border-radius:12px;
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:20px;font-weight:600;color:#fff;
}
.auth-box h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:600;margin-bottom:6px;}
.auth-box p{font-size:13px;color:var(--text2);margin-bottom:28px;}
.auth-box input{
  width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;
  padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);outline:none;
  margin-bottom:12px;text-align:center;letter-spacing:4px;
  transition:border-color .2s,box-shadow .2s;
}
.auth-box input:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt);}
.auth-btn{
  width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;
  padding:12px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--sage),#5D8A7A);
  color:#fff;cursor:pointer;
  transition:transform .15s,box-shadow .15s,opacity .15s;
  box-shadow:0 2px 8px rgba(124,154,142,.35);
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(124,154,142,.45);}
.auth-btn:active{transform:translateY(0) scale(.98);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.auth-error{font-size:12px;color:var(--rose);margin-top:10px;display:none;animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── APP ── */
#app{display:none;min-height:100vh;animation:fadeUp .4s ease both;}

/* ── HEADER ── */
.app-header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(8px);
}
.app-logo{
  width:36px;height:36px;flex-shrink:0;
  background:linear-gradient(135deg,var(--sage),var(--sky));
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:#fff;
}
.app-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;flex:1;}
.header-search-wrap{flex:1;max-width:320px;}
.header-search{
  width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;
  padding:8px 12px 8px 36px;
  border:1.5px solid var(--border);border-radius:20px;
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.header-search:focus{border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt);}
.search-wrap{position:relative;}
.search-icon{
  position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;font-size:14px;
}

/* ── TABS ── */
.tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  padding:0 24px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab-btn{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;
  padding:12px 20px;border:none;background:none;color:var(--text2);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .2s,border-color .2s;white-space:nowrap;
}
.tab-btn.active{color:var(--sage);border-bottom-color:var(--sage);}
.tab-btn:hover{color:var(--text);}
.tab-panel{display:none;padding:24px;}
.tab-panel.active{display:block;animation:fadeUp .3s ease both;}

/* ── STATS ROW ── */
.panel-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:600;}
.panel-title span{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:400;
  color:var(--text3);margin-left:8px;
}
.stats{display:flex;gap:8px;flex-wrap:wrap;}
.stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 16px;
  font-size:11px;color:var(--text2);
  transition:box-shadow .2s,transform .2s;
}
.stat:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.stat strong{
  font-family:'Syne',sans-serif;font-size:18px;font-weight:600;
  color:var(--text);display:block;line-height:1.2;
}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;gap:8px;margin-bottom:16px;
  flex-wrap:wrap;align-items:center;
}
.filter-btn{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;
  transition:all .2s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--sage);color:var(--sage);}
.filter-btn.active{
  background:var(--sage);color:#fff;border-color:var(--sage);
  box-shadow:0 2px 8px rgba(124,154,142,.3);
}
.search-input{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;
  padding:7px 12px 7px 34px;
  border:1.5px solid var(--border);border-radius:20px;
  background:var(--surface);color:var(--text);outline:none;
  width:200px;
  transition:border-color .2s,box-shadow .2s,width .3s;
}
.search-input:focus{
  border-color:var(--sage);
  box-shadow:0 0 0 3px var(--sage-lt);
  width:260px;
}
.add-btn{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;
  padding:8px 18px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--sage),#5D8A7A);
  color:#fff;cursor:pointer;margin-left:auto;
  display:flex;align-items:center;gap:6px;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(124,154,142,.3);
}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,154,142,.4);}
.add-btn:active{transform:scale(.97);}

/* ── TABLE ── */
.table-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow);
}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{
  text-align:left;padding:12px 16px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--text3);border-bottom:1px solid var(--border);
  background:var(--bg);cursor:pointer;user-select:none;white-space:nowrap;
  transition:color .15s;
}
thead th:hover{color:var(--text);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#FAFAF8;}
td{padding:12px 16px;vertical-align:middle;}
.cell-main{font-weight:600;font-size:13px;}
.cell-sub{color:var(--text2);font-size:12px;margin-top:2px;}
.cell-muted{font-size:12px;color:var(--text2);}
.cell-mono{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;}
.cell-small{font-size:12px;max-width:180px;line-height:1.4;}
.link-btn{
  color:var(--sky);font-size:12px;text-decoration:none;font-weight:500;
  transition:color .15s;
}
.link-btn:hover{color:#4A72B0;}

/* ── BADGES ── */
.badge{
  display:inline-flex;align-items:center;
  font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:20px;white-space:nowrap;
}

/* ── ACTION BUTTONS ── */
.actions{display:flex;gap:5px;}
.icon-btn{
  background:none;border:1.5px solid var(--border);
  border-radius:7px;padding:5px 8px;
  cursor:pointer;font-size:12px;color:var(--text2);
  transition:all .15s;
}
.icon-btn:hover{background:var(--sage-lt);border-color:var(--sage);color:var(--sage);}
.icon-btn:active{transform:scale(.93);}
.icon-btn.del:hover{background:var(--rose-lt);border-color:var(--rose);color:var(--rose);}

/* ── EMPTY / LOADING ── */
.loading,.empty{text-align:center;padding:56px 24px;color:var(--text3);font-size:14px;}
.loading::before{content:'⟳';display:block;font-size:28px;margin-bottom:10px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── OVERLAY / MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(20,18,14,.4);backdrop-filter:blur(4px);
  z-index:100;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;
}
.overlay.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border-radius:var(--radius-lg);
  padding:28px;width:100%;max-width:540px;
  border:1px solid var(--border);margin:auto;
  box-shadow:var(--shadow-md);
  animation:slideUp .25s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal h3{
  font-family:'Syne',sans-serif;font-size:17px;font-weight:600;
  margin-bottom:22px;
}
.field{margin-bottom:14px;}
label{
  display:block;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.5px;
  color:var(--text3);margin-bottom:5px;
}
input,select,textarea{
  width:100%;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;
  padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-lt);
}
textarea{resize:vertical;min-height:72px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{
  display:flex;justify-content:flex-end;gap:10px;margin-top:24px;
  padding-top:20px;border-top:1px solid var(--border);
}
.btn-cancel{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:500;
  padding:9px 18px;border-radius:var(--radius);
  border:1.5px solid var(--border);background:transparent;color:var(--text2);
  cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{border-color:var(--border2);color:var(--text);}
.btn-cancel:active{transform:scale(.97);}
.btn-save{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;
  padding:9px 22px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--sage),#5D8A7A);
  color:#fff;cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(124,154,142,.3);
}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(124,154,142,.4);}
.btn-save:active{transform:scale(.97);}
.btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--text);color:#fff;
  font-size:13px;font-weight:500;
  padding:11px 20px;border-radius:var(--radius);
  opacity:0;transition:opacity .3s,transform .3s;
  transform:translateY(8px);
  z-index:200;pointer-events:none;
  box-shadow:var(--shadow-md);
}
.toast.show{opacity:1;transform:translateY(0);}

/* ── MOBILE ── */
@media(max-width:768px){
  .app-header{padding:12px 16px;gap:8px;}
  .header-search-wrap{display:none;}
  .tabs{padding:0 16px;}
  .tab-panel{padding:16px;}
  .panel-header{flex-direction:column;gap:10px;}
  .stats{gap:6px;}
  .stat{padding:8px 12px;}
  .stat strong{font-size:15px;}
  .toolbar{gap:6px;}
  .add-btn{padding:7px 14px;font-size:12px;}
  .row2{grid-template-columns:1fr;}
  .modal{padding:20px;}
  .table-wrap{overflow-x:auto;}
  table{min-width:600px;}
  td,thead th{padding:10px 12px;}
  .search-input{width:160px;}
  .search-input:focus{width:200px;}
}
@media(max-width:480px){
  .auth-box{padding:32px 24px;}
  .stats .stat:nth-child(n+4){display:none;}
  .filter-btn{font-size:11px;padding:5px 10px;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">JP</div>
    <h1>Job Pipeline</h1>
    <p>Enter your password to continue</p>
    <input type="password" id="pwd-input" placeholder="••••••••">
    <button class="auth-btn" id="auth-btn" onclick="checkAuth()">Access →</button>
    <div class="auth-error" id="auth-error">Incorrect password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-logo">JP</div>
    <div class="app-title">Job Pipeline</div>
    <div class="header-search-wrap">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="header-search" id="global-search" placeholder="Search anything..." oninput="onGlobalSearch(this.value)">
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pipeline',this)">Applications</button>
    <button class="tab-btn" onclick="switchTab('companies',this)">Companies</button>
  </div>

  <!-- PIPELINE TAB -->
  <div id="tab-pipeline" class="tab-panel active">
    <div class="panel-header">
      <div>
        <div class="panel-title">Applications <span id="total-label">0 roles</span></div>
      </div>
      <div class="stats">
        <div class="stat"><strong id="st-active">0</strong>Active</div>
        <div class="stat"><strong id="st-interview">0</strong>Interviews</div>
        <div class="stat"><strong id="st-offer">0</strong>Offers</div>
        <div class="stat"><strong id="st-week">0</strong>This week</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('all',this,'p')">All</button>
      <button class="filter-btn" onclick="setFilter('Applied',this,'p')">Applied</button>
      <button class="filter-btn" onclick="setFilter('Screening',this,'p')">Screening</button>
      <button class="filter-btn" onclick="setFilter('Interview',this,'p')">Interview</button>
      <button class="filter-btn" onclick="setFilter('Offer',this,'p')">Offer</button>
      <button class="filter-btn" onclick="setFilter('Rejected',this,'p')">Rejected</button>
      <button class="filter-btn" onclick="setFilter('No answer',this,'p')">No answer</button>
      <div class="search-wrap" style="margin-left:auto">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="pipeline-search" placeholder="Search roles..." oninput="renderPipeline()">
      </div>
      <button class="add-btn" onclick="openPipelineModal()">+ Add role</button>
    </div>
    <div class="table-wrap" id="pipeline-wrap"></div>
  </div>

  <!-- COMPANIES TAB -->
  <div id="tab-companies" class="tab-panel">
    <div class="panel-header">
      <div>
        <div class="panel-title">Companies <span id="companies-label">0 companies</span></div>
      </div>
      <div class="stats">
        <div class="stat"><strong id="sc-interesting">0</strong>Interesting</div>
        <div class="stat"><strong id="sc-contacted">0</strong>Contacted</div>
        <div class="stat"><strong id="sc-watch">0</strong>Watch</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('all',this,'c')">All</button>
      <button class="filter-btn" onclick="setFilter('Interesting',this,'c')">Interesting</button>
      <button class="filter-btn" onclick="setFilter('Watch',this,'c')">Watch</button>
      <button class="filter-btn" onclick="setFilter('Contacted',this,'c')">Contacted</button>
      <button class="filter-btn" onclick="setFilter('Discarded',this,'c')">Discarded</button>
      <div class="search-wrap" style="margin-left:auto">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="company-search" placeholder="Search companies..." oninput="renderCompanies()">
      </div>
      <button class="add-btn" onclick="openCompanyModal()">+ Add company</button>
    </div>
    <div class="table-wrap" id="companies-wrap"></div>
  </div>
</div>

<!-- PIPELINE MODAL -->
<div class="overlay" id="pipeline-overlay" onclick="closeIfOutside(event,'pipeline-overlay')">
  <div class="modal">
    <h3 id="pipeline-modal-title">Add role</h3>
    <div class="row2">
      <div class="field"><label>Company *</label><input id="pf-company" placeholder="e.g. Salesforce"></div>
      <div class="field"><label>Role *</label><input id="pf-role" placeholder="e.g. Engagement Manager"></div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Status</label>
        <select id="pf-status">
          <option>Applied</option><option>Screening</option><option>Interview</option>
          <option>Offer</option><option>Rejected</option><option>No answer</option>
        </select>
      </div>
      <div class="field">
        <label>Channel</label>
        <select id="pf-channel">
          <option>LinkedIn</option><option>Recruiter</option><option>Direct</option>
          <option>Referral</option><option>Job board</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Date applied</label><input type="date" id="pf-date"></div>
      <div class="field"><label>Salary band</label><input id="pf-salary" placeholder="e.g. 70–80k"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Recruiter name</label><input id="pf-recruiter-name" placeholder="e.g. Sarah Johnson"></div>
      <div class="field"><label>Recruiter contact</label><input id="pf-recruiter-contact" placeholder="email or LinkedIn"></div>
    </div>
    <div class="field"><label>Next step</label><input id="pf-next" placeholder="e.g. Follow up Friday"></div>
    <div class="field"><label>Notes</label><textarea id="pf-notes" placeholder="Impressions, links, context..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('pipeline-overlay')">Cancel</button>
      <button class="btn-save" id="pipeline-btn-save" onclick="savePipelineEntry()">Save</button>
    </div>
  </div>
</div>

<!-- COMPANY MODAL -->
<div class="overlay" id="company-overlay" onclick="closeIfOutside(event,'company-overlay')">
  <div class="modal">
    <h3 id="company-modal-title">Add company</h3>
    <div class="row2">
      <div class="field"><label>Company *</label><input id="cf-company" placeholder="e.g. HubSpot"></div>
      <div class="field"><label>Sector</label><input id="cf-sector" placeholder="e.g. CRM / Martech"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Revenue</label><input id="cf-revenue" placeholder="e.g. $2.6B"></div>
      <div class="field"><label>Employees</label><input id="cf-employees" placeholder="e.g. 7400"></div>
    </div>
    <div class="row2">
      <div class="field"><label>EMEA Presence</label><input id="cf-emea" placeholder="e.g. Madrid / Dublin"></div>
      <div class="field">
        <label>Status</label>
        <select id="cf-status">
          <option value=""></option>
          <option>Interesting</option><option>Watch</option>
          <option>Contacted</option><option>Discarded</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Jobs URL</label><input id="cf-jobs" placeholder="https://..."></div>
    <div class="field"><label>Notes</label><textarea id="cf-notes" placeholder="Context, contacts, open roles..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('company-overlay')">Cancel</button>
      <button class="btn-save" id="company-btn-save" onclick="saveCompanyEntry()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER = 'https://jc-pipeline.jcarloscsva.workers.dev';
let pipelineData=[], companiesData=[];
let pipelineEditId=null, companyEditId=null;
let pipelineFilter='all', companiesFilter='all';
let pipelineSortKey='Date Applied', pipelineSortDir=-1;
let companiesSortKey='Revenue', companiesSortDir=-1;
let globalSearch='';

const pStatus={
  Applied:  {bg:'var(--sky-lt)',  color:'var(--sky)'},
  Screening:{bg:'var(--amber-lt)',color:'var(--amber)'},
  Interview:{bg:'var(--sage-lt)', color:'var(--sage)'},
  Offer:    {bg:'var(--plum-lt)', color:'var(--plum)'},
  Rejected: {bg:'var(--rose-lt)', color:'var(--rose)'},
  'No answer':{bg:'var(--slate-lt)',color:'var(--slate)'},
};
const cStatus={
  Interesting:{bg:'var(--sky-lt)',  color:'var(--sky)'},
  Watch:      {bg:'var(--amber-lt)',color:'var(--amber)'},
  Contacted:  {bg:'var(--sage-lt)', color:'var(--sage)'},
  Discarded:  {bg:'var(--rose-lt)', color:'var(--rose)'},
};

// AUTH
async function checkAuth(){
  const val=document.getElementById('pwd-input').value.trim();
  if(!val)return;
  const btn=document.getElementById('auth-btn');
  btn.disabled=true;btn.textContent='Checking...';
  try{
    const r=await fetch(`${WORKER}/api/config`);
    const d=await r.json();
    const rec=d.records?.[0];
    if(rec&&rec.fields['Value']===val){
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='block';
      loadPipeline();loadCompanies();
    }else{
      const err=document.getElementById('auth-error');
      err.style.display='block';
      document.getElementById('pwd-input').value='';
      document.getElementById('pwd-input').focus();
    }
  }catch(e){
    const err=document.getElementById('auth-error');
    err.textContent='Connection error. Try again.';
    err.style.display='block';
  }
  btn.disabled=false;btn.textContent='Access →';
}

// GLOBAL SEARCH
function onGlobalSearch(val){
  globalSearch=val.toLowerCase();
  renderPipeline();renderCompanies();
}

// TABS
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// PIPELINE
async function loadPipeline(){
  document.getElementById('pipeline-wrap').innerHTML='<div class="loading"></div>';
  try{
    let all=[],offset=null;
    do{
      const url=`${WORKER}/api/records?pageSize=100`+(offset?'&offset='+offset:'');
      const r=await fetch(url);const d=await r.json();
      all=all.concat(d.records||[]);offset=d.offset;
    }while(offset);
    pipelineData=all.map(r=>({id:r.id,...r.fields}));
    renderPipeline();
  }catch(e){
    document.getElementById('pipeline-wrap').innerHTML='<div class="empty">Error loading data.</div>';
  }
}

function renderPipeline(){
  const localSearch=(document.getElementById('pipeline-search')?.value||'').toLowerCase();
  const search=globalSearch||localSearch;
  let rows=[...pipelineData];
  if(pipelineFilter!=='all')rows=rows.filter(r=>r['Status']===pipelineFilter);
  if(search)rows=rows.filter(r=>
    (r['Company']||'').toLowerCase().includes(search)||
    (r['Role']||'').toLowerCase().includes(search)||
    (r['Recruiter Name']||'').toLowerCase().includes(search)||
    (r['Next Step']||'').toLowerCase().includes(search)||
    (r['Notes']||'').toLowerCase().includes(search)
  );
  rows.sort((a,b)=>{
    let av=a[pipelineSortKey]||'',bv=b[pipelineSortKey]||'';
    return av<bv?pipelineSortDir:av>bv?-pipelineSortDir:0;
  });
  const wrap=document.getElementById('pipeline-wrap');
  if(!rows.length){
    wrap.innerHTML='<div class="empty">No applications found.</div>';
  }else{
    wrap.innerHTML=`<table>
      <thead><tr>
        <th onclick="sortPipeline('Company')">Company</th>
        <th onclick="sortPipeline('Status')">Status</th>
        <th onclick="sortPipeline('Channel')">Channel</th>
        <th onclick="sortPipeline('Date Applied')">Date</th>
        <th>Recruiter</th>
        <th>Next step</th>
        <th></th>
      </tr></thead>
      <tbody>${rows.map(r=>{
        const s=pStatus[r['Status']]||pStatus['Applied'];
        const dateStr=r['Date Applied']?new Date(r['Date Applied']+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
        return`<tr>
          <td><div class="cell-main">${esc(r['Company']||'')}</div><div class="cell-sub">${esc(r['Role']||'')}${r['Salary Band']?' · '+esc(r['Salary Band']):''}</div></td>
          <td><span class="badge" style="background:${s.bg};color:${s.color}">${esc(r['Status']||'')}</span></td>
          <td><span class="cell-muted">${esc(r['Channel']||'')}</span></td>
          <td><span class="cell-mono">${dateStr}</span></td>
          <td><div class="cell-main" style="font-size:12px">${esc(r['Recruiter Name']||'')}</div><div class="cell-sub">${esc(r['Recruiter Contact']||'')}</div></td>
          <td><span class="cell-small">${esc(r['Next Step']||'')}</span></td>
          <td><div class="actions">
            <button class="icon-btn" onclick="openPipelineModal('${r.id}')">✎</button>
            <button class="icon-btn del" onclick="deletePipelineEntry('${r.id}')">✕</button>
          </div></td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }
  updatePipelineStats();
}

function updatePipelineStats(){
  const now=new Date(),weekAgo=new Date(now-7*86400000);
  document.getElementById('total-label').textContent=pipelineData.length+' role'+(pipelineData.length!==1?'s':'');
  document.getElementById('st-active').textContent=pipelineData.filter(r=>!['Rejected','No answer'].includes(r['Status'])).length;
  document.getElementById('st-interview').textContent=pipelineData.filter(r=>r['Status']==='Interview').length;
  document.getElementById('st-offer').textContent=pipelineData.filter(r=>r['Status']==='Offer').length;
  document.getElementById('st-week').textContent=pipelineData.filter(r=>r['Date Applied']&&new Date(r['Date Applied'])>=weekAgo).length;
}

// COMPANIES
async function loadCompanies(){
  document.getElementById('companies-wrap').innerHTML='<div class="loading"></div>';
  try{
    let all=[],offset=null;
    do{
      const url=`${WORKER}/api/companies?pageSize=100`+(offset?'&offset='+offset:'');
      const r=await fetch(url);const d=await r.json();
      all=all.concat(d.records||[]);offset=d.offset;
    }while(offset);
    companiesData=all.map(r=>({id:r.id,...r.fields}));
    renderCompanies();
  }catch(e){
    document.getElementById('companies-wrap').innerHTML='<div class="empty">Error loading companies.</div>';
  }
}

function renderCompanies(){
  const localSearch=(document.getElementById('company-search')?.value||'').toLowerCase();
  const search=globalSearch||localSearch;
  let rows=[...companiesData];
  if(companiesFilter!=='all')rows=rows.filter(r=>r['Status']===companiesFilter);
  if(search)rows=rows.filter(r=>
    (r['Company']||'').toLowerCase().includes(search)||
    (r['Sector']||'').toLowerCase().includes(search)||
    (r['EMEA Presence']||'').toLowerCase().includes(search)||
    (r['Notes']||'').toLowerCase().includes(search)
  );
  rows.sort((a,b)=>{
    let av=a[companiesSortKey]||'',bv=b[companiesSortKey]||'';
    return av<bv?companiesSortDir:av>bv?-companiesSortDir:0;
  });
  const wrap=document.getElementById('companies-wrap');
  if(!rows.length){
    wrap.innerHTML='<div class="empty">No companies found.</div>';
  }else{
    wrap.innerHTML=`<table>
      <thead><tr>
        <th onclick="sortCompanies('Company')">Company</th>
        <th onclick="sortCompanies('Sector')">Sector</th>
        <th onclick="sortCompanies('Revenue')">Revenue</th>
        <th onclick="sortCompanies('Employees')">Employees</th>
        <th onclick="sortCompanies('EMEA Presence')">EMEA</th>
        <th onclick="sortCompanies('Status')">Status</th>
        <th></th>
      </tr></thead>
      <tbody>${rows.map(r=>{
        const s=cStatus[r['Status']]||null;
        const badge=s?`<span class="badge" style="background:${s.bg};color:${s.color}">${esc(r['Status'])}</span>`:'<span class="cell-muted">—</span>';
        const jobsLink=r['Jobs URL']?`<a href="${esc(r['Jobs URL'])}" target="_blank" class="link-btn">Jobs ↗</a>`:'';
        return`<tr>
          <td><div class="cell-main">${esc(r['Company']||'')}</div>${jobsLink?'<div class="cell-sub">'+jobsLink+'</div>':''}</td>
          <td><span class="cell-muted">${esc(r['Sector']||'')}</span></td>
          <td><span class="cell-mono">${esc(r['Revenue']||'')}</span></td>
          <td><span class="cell-muted">${esc(r['Employees']||'')}</span></td>
          <td><span class="cell-muted">${esc(r['EMEA Presence']||'')}</span></td>
          <td>${badge}</td>
          <td><div class="actions">
            <button class="icon-btn" onclick="openCompanyModal('${r.id}')">✎</button>
            <button class="icon-btn del" onclick="deleteCompanyEntry('${r.id}')">✕</button>
          </div></td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }
  updateCompaniesStats();
}

function updateCompaniesStats(){
  document.getElementById('companies-label').textContent=companiesData.length+' companies';
  document.getElementById('sc-interesting').textContent=companiesData.filter(r=>r['Status']==='Interesting').length;
  document.getElementById('sc-contacted').textContent=companiesData.filter(r=>r['Status']==='Contacted').length;
  document.getElementById('sc-watch').textContent=companiesData.filter(r=>r['Status']==='Watch').length;
}

// FILTERS & SORT
function setFilter(f,btn,type){
  if(type==='p'){pipelineFilter=f;document.querySelectorAll('#tab-pipeline .filter-btn').forEach(b=>b.classList.remove('active'));renderPipeline();}
  else{companiesFilter=f;document.querySelectorAll('#tab-companies .filter-btn').forEach(b=>b.classList.remove('active'));renderCompanies();}
  btn.classList.add('active');
}
function sortPipeline(k){if(pipelineSortKey===k)pipelineSortDir*=-1;else{pipelineSortKey=k;pipelineSortDir=1;}renderPipeline();}
function sortCompanies(k){if(companiesSortKey===k)companiesSortDir*=-1;else{companiesSortKey=k;companiesSortDir=1;}renderCompanies();}

// PIPELINE MODAL
function openPipelineModal(id){
  pipelineEditId=id||null;
  document.getElementById('pipeline-modal-title').textContent=pipelineEditId?'Edit role':'Add role';
  if(pipelineEditId){
    const r=pipelineData.find(x=>x.id===pipelineEditId);
    document.getElementById('pf-company').value=r['Company']||'';
    document.getElementById('pf-role').value=r['Role']||'';
    document.getElementById('pf-status').value=r['Status']||'Applied';
    document.getElementById('pf-channel').value=r['Channel']||'LinkedIn';
    document.getElementById('pf-date').value=r['Date Applied']||'';
    document.getElementById('pf-salary').value=r['Salary Band']||'';
    document.getElementById('pf-recruiter-name').value=r['Recruiter Name']||'';
    document.getElementById('pf-recruiter-contact').value=r['Recruiter Contact']||'';
    document.getElementById('pf-next').value=r['Next Step']||'';
    document.getElementById('pf-notes').value=r['Notes']||'';
  }else{
    ['pf-company','pf-role','pf-salary','pf-recruiter-name','pf-recruiter-contact','pf-next','pf-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('pf-status').value='Applied';
    document.getElementById('pf-channel').value='LinkedIn';
    document.getElementById('pf-date').value=new Date().toISOString().split('T')[0];
  }
  document.getElementById('pipeline-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('pf-company').focus(),80);
}

async function savePipelineEntry(){
  const company=document.getElementById('pf-company').value.trim();
  const role=document.getElementById('pf-role').value.trim();
  if(!company||!role){alert('Company and role are required.');return;}
  const fields={
    'Company':company,'Role':role,
    'Status':document.getElementById('pf-status').value,
    'Channel':document.getElementById('pf-channel').value,
    'Date Applied':document.getElementById('pf-date').value||null,
    'Salary Band':document.getElementById('pf-salary').value.trim(),
    'Recruiter Name':document.getElementById('pf-recruiter-name').value.trim(),
    'Recruiter Contact':document.getElementById('pf-recruiter-contact').value.trim(),
    'Next Step':document.getElementById('pf-next').value.trim(),
    'Notes':document.getElementById('pf-notes').value.trim(),
  };
  const btn=document.getElementById('pipeline-btn-save');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    if(pipelineEditId){
      const r=await fetch(`${WORKER}/api/records/${pipelineEditId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
      const d=await r.json();
      const idx=pipelineData.findIndex(x=>x.id===pipelineEditId);
      pipelineData[idx]={id:pipelineEditId,...d.fields};
    }else{
      const r=await fetch(`${WORKER}/api/records`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
      const d=await r.json();
      pipelineData.unshift({id:d.id,...d.fields});
    }
    renderPipeline();closeModal('pipeline-overlay');showToast(pipelineEditId?'Entry updated ✓':'Role added ✓');
  }catch(e){alert('Error saving.');}
  btn.disabled=false;btn.textContent='Save';
}

async function deletePipelineEntry(id){
  if(!confirm('Remove this entry?'))return;
  try{
    await fetch(`${WORKER}/api/records/${id}`,{method:'DELETE'});
    pipelineData=pipelineData.filter(x=>x.id!==id);
    renderPipeline();showToast('Entry removed');
  }catch(e){alert('Error deleting.');}
}

// COMPANY MODAL
function openCompanyModal(id){
  companyEditId=id||null;
  document.getElementById('company-modal-title').textContent=companyEditId?'Edit company':'Add company';
  if(companyEditId){
    const r=companiesData.find(x=>x.id===companyEditId);
    document.getElementById('cf-company').value=r['Company']||'';
    document.getElementById('cf-sector').value=r['Sector']||'';
    document.getElementById('cf-revenue').value=r['Revenue']||'';
    document.getElementById('cf-employees').value=r['Employees']||'';
    document.getElementById('cf-emea').value=r['EMEA Presence']||'';
    document.getElementById('cf-status').value=r['Status']||'';
    document.getElementById('cf-jobs').value=r['Jobs URL']||'';
    document.getElementById('cf-notes').value=r['Notes']||'';
  }else{
    ['cf-company','cf-sector','cf-revenue','cf-employees','cf-emea','cf-jobs','cf-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('cf-status').value='';
  }
  document.getElementById('company-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('cf-company').focus(),80);
}

async function saveCompanyEntry(){
  const company=document.getElementById('cf-company').value.trim();
  if(!company){alert('Company name is required.');return;}
  const fields={
    'Company':company,
    'Sector':document.getElementById('cf-sector').value.trim(),
    'Revenue':document.getElementById('cf-revenue').value.trim(),
    'Employees':document.getElementById('cf-employees').value.trim(),
    'EMEA Presence':document.getElementById('cf-emea').value.trim(),
    'Status':document.getElementById('cf-status').value,
    'Jobs URL':document.getElementById('cf-jobs').value.trim(),
    'Notes':document.getElementById('cf-notes').value.trim(),
  };
  const btn=document.getElementById('company-btn-save');
  btn.disabled=true;btn.textContent='Saving...';
  try{
    if(companyEditId){
      const r=await fetch(`${WORKER}/api/companies/${companyEditId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
      const d=await r.json();
      const idx=companiesData.findIndex(x=>x.id===companyEditId);
      companiesData[idx]={id:companyEditId,...d.fields};
    }else{
      const r=await fetch(`${WORKER}/api/companies`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
      const d=await r.json();
      companiesData.unshift({id:d.id,...d.fields});
    }
    renderCompanies();closeModal('company-overlay');showToast(companyEditId?'Company updated ✓':'Company added ✓');
  }catch(e){alert('Error saving.');}
  btn.disabled=false;btn.textContent='Save';
}

async function deleteCompanyEntry(id){
  if(!confirm('Remove this company?'))return;
  try{
    await fetch(`${WORKER}/api/companies/${id}`,{method:'DELETE'});
    companiesData=companiesData.filter(x=>x.id!==id);
    renderCompanies();showToast('Company removed');
  }catch(e){alert('Error deleting.');}
}

// UTILS
function closeModal(id){document.getElementById(id).classList.remove('open');pipelineEditId=null;companyEditId=null;}
function closeIfOutside(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('pipeline-overlay');closeModal('company-overlay');}});
document.getElementById('pwd-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkAuth();});
</script>
</body>
</html>
