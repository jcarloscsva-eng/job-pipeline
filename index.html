<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EE; --surface: #FFFFFF; --border: #E2DDD4;
    --text: #1A1916; --muted: #8C8880; --accent: #2D5BE3;
    --s-applied: #E8F0FE; --s-applied-t: #1A3A9C;
    --s-screening: #FFF3CD; --s-screening-t: #7A5000;
    --s-interview: #E6F4EA; --s-interview-t: #1A5C2A;
    --s-offer: #FCE8FF; --s-offer-t: #6B1A8A;
    --s-rejected: #FEECEC; --s-rejected-t: #8A1A1A;
    --s-no-answer: #F0EFED; --s-no-answer-t: #5C5A56;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 360px; text-align: center; }
  .auth-box h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .auth-box p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .auth-box input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 3px; }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-btn { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; padding: 10px; border: none; border-radius: 8px; background: var(--accent); color: #fff; cursor: pointer; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error { font-size: 12px; color: #E24B4A; margin-top: 8px; display: none; }

  /* APP */
  #app { display: none; }

  /* TABS */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 14px 20px; border: none; background: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-content { display: none; padding: 32px 24px; }
  .tab-content.active { display: block; }

  /* SHARED */
  .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h2 { font-size: 20px; font-weight: 500; letter-spacing: -0.3px; }
  h2 span { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400; color: var(--muted); margin-left: 10px; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; color: var(--muted); }
  .stat strong { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--text); display: block; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active, .filter-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
  .add-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; margin-left: auto; transition: opacity 0.15s; }
  .add-btn:hover { opacity: 0.85; }
  .search-input { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--text); outline: none; width: 180px; }
  .search-input:focus { border-color: var(--accent); }
  .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 14px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  thead th { text-align: left; padding: 12px 14px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  td { padding: 11px 14px; vertical-align: middle; }
  .co-name { font-weight: 500; }
  .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .channel { font-size: 12px; color: var(--muted); }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .recruiter-name { font-size: 12px; font-weight: 500; }
  .recruiter-contact { font-size: 11px; color: var(--muted); }
  .revenue { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
  .jobs-link { font-size: 12px; color: var(--accent); text-decoration: none; }
  .jobs-link:hover { text-decoration: underline; }
  .actions { display: flex; gap: 6px; }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 7px; cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.15s; }
  .icon-btn:hover { background: var(--bg); color: var(--text); }
  .icon-btn.del:hover { border-color: #E24B4A; color: #E24B4A; }
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; padding: 24px; overflow-y: auto; }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; padding: 28px; width: 100%; max-width: 520px; border: 1px solid var(--border); margin: auto; }
  .modal h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 5px; }
  input, select, textarea { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .btn-cancel { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 16px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .btn-save { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: 7px; border: none; background: var(--accent); color: #fff; cursor: pointer; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; font-size: 13px; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>Job Pipeline</h1>
    <p>Enter your password to continue</p>
    <input type="password" id="pwd-input" placeholder="••••••••">
    <button class="auth-btn" id="auth-btn" onclick="checkAuth()">Access</button>
    <div class="auth-error" id="auth-error">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('pipeline',this)">Pipeline</button>
    <button class="tab-btn" onclick="switchTab('companies',this)">Companies</button>
  </div>

  <!-- PIPELINE -->
  <div class="tab-content active" id="tab-pipeline">
    <div class="page-header">
      <h2>Pipeline <span id="p-total">0 roles</span></h2>
      <div class="stats">
        <div class="stat"><strong id="st-active">0</strong>Active</div>
        <div class="stat"><strong id="st-interview">0</strong>Interviews</div>
        <div class="stat"><strong id="st-offer">0</strong>Offers</div>
        <div class="stat"><strong id="st-week">0</strong>This week</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('p','all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('p','Applied',this)">Applied</button>
      <button class="filter-btn" onclick="setFilter('p','Screening',this)">Screening</button>
      <button class="filter-btn" onclick="setFilter('p','Interview',this)">Interview</button>
      <button class="filter-btn" onclick="setFilter('p','Offer',this)">Offer</button>
      <button class="filter-btn" onclick="setFilter('p','Rejected',this)">Rejected</button>
      <button class="filter-btn" onclick="setFilter('p','No answer',this)">No answer</button>
      <button class="add-btn" onclick="openModal('p')">+ Add role</button>
    </div>
    <div id="p-wrap"></div>
  </div>

  <!-- COMPANIES -->
  <div class="tab-content" id="tab-companies">
    <div class="page-header">
      <h2>Companies <span id="c-total">0 companies</span></h2>
      <div class="stats">
        <div class="stat"><strong id="c-interesting">0</strong>Interesting</div>
        <div class="stat"><strong id="c-contacted">0</strong>Contacted</div>
      </div>
    </div>
    <div class="toolbar">
      <button class="filter-btn active" onclick="setFilter('c','all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('c','Interesting',this)">Interesting</button>
      <button class="filter-btn" onclick="setFilter('c','Contacted',this)">Contacted</button>
      <button class="filter-btn" onclick="setFilter('c','Discarded',this)">Discarded</button>
      <input class="search-input" id="c-search" placeholder="Search..." oninput="renderC()">
      <button class="add-btn" onclick="openModal('c')">+ Add company</button>
    </div>
    <div id="c-wrap"></div>
  </div>
</div>

<!-- PIPELINE MODAL -->
<div class="overlay" id="p-overlay" onclick="if(event.target===this)closeModal('p-overlay')">
  <div class="modal">
    <h3 id="p-modal-title">Add role</h3>
    <div class="row2">
      <div class="field"><label>Company *</label><input id="pf-company" placeholder="e.g. Salesforce"></div>
      <div class="field"><label>Role *</label><input id="pf-role" placeholder="e.g. Engagement Manager"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Status</label>
        <select id="pf-status"><option>Applied</option><option>Screening</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>No answer</option></select>
      </div>
      <div class="field"><label>Channel</label>
        <select id="pf-channel"><option>LinkedIn</option><option>Recruiter</option><option>Direct</option><option>Referral</option><option>Job board</option><option>Other</option></select>
      </div>
    </div>
    <div class="row2">
      <div class="field"><label>Date applied</label><input type="date" id="pf-date"></div>
      <div class="field"><label>Salary band</label><input id="pf-salary" placeholder="e.g. 70–80k"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Recruiter name</label><input id="pf-rname" placeholder="e.g. Sarah Johnson"></div>
      <div class="field"><label>Recruiter contact</label><input id="pf-rcontact" placeholder="email, phone or LinkedIn"></div>
    </div>
    <div class="field"><label>Next step</label><input id="pf-next" placeholder="e.g. Follow up on Friday"></div>
    <div class="field"><label>Notes</label><textarea id="pf-notes"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('p-overlay')">Cancel</button>
      <button class="btn-save" id="p-save-btn" onclick="saveP()">Save</button>
    </div>
  </div>
</div>

<!-- COMPANIES MODAL -->
<div class="overlay" id="c-overlay" onclick="if(event.target===this)closeModal('c-overlay')">
  <div class="modal">
    <h3 id="c-modal-title">Add company</h3>
    <div class="row2">
      <div class="field"><label>Company *</label><input id="cf-company" placeholder="e.g. HubSpot"></div>
      <div class="field"><label>Sector</label><input id="cf-sector" placeholder="e.g. CRM"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Revenue</label><input id="cf-revenue" placeholder="e.g. $2.6B"></div>
      <div class="field"><label>Employees</label><input id="cf-employees" placeholder="e.g. 7400"></div>
    </div>
    <div class="row2">
      <div class="field"><label>EMEA Presence</label><input id="cf-emea" placeholder="e.g. Dublin"></div>
      <div class="field"><label>Status</label>
        <select id="cf-status"><option value="">None</option><option>Interesting</option><option>Contacted</option><option>Discarded</option></select>
      </div>
    </div>
    <div class="field"><label>Jobs URL</label><input id="cf-jobs" placeholder="https://..."></div>
    <div class="field"><label>Notes</label><textarea id="cf-notes"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('c-overlay')">Cancel</button>
      <button class="btn-save" id="c-save-btn" onclick="saveC()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const W = 'https://jc-pipeline.jcarloscsva.workers.dev';
let PD = [], CD = [];
let pEditId = null, cEditId = null;
let pFilter = 'all', cFilter = 'all';
let pSortK = 'Date Applied', pSortD = -1;
let cSortK = 'Revenue', cSortD = -1;

const PS = {
  'Applied':   ['#E8F0FE','#1A3A9C'], 'Screening': ['#FFF3CD','#7A5000'],
  'Interview': ['#E6F4EA','#1A5C2A'], 'Offer':     ['#FCE8FF','#6B1A8A'],
  'Rejected':  ['#FEECEC','#8A1A1A'], 'No answer': ['#F0EFED','#5C5A56'],
};
const CS = {
  'Interesting': ['#E8F0FE','#1A3A9C'],
  'Contacted':   ['#E6F4EA','#1A5C2A'],
  'Discarded':   ['#FEECEC','#8A1A1A'],
};

async function checkAuth() {
  const val = document.getElementById('pwd-input').value.trim();
  if (!val) return;
  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Checking...';
  try {
    const r = await fetch(`${W}/api/config`);
    const d = await r.json();
    if (d.records?.[0]?.fields['Value'] === val) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadP(); loadC();
    } else {
      document.getElementById('auth-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
      document.getElementById('pwd-input').focus();
    }
  } catch(e) {
    document.getElementById('auth-error').textContent = 'Connection error.';
    document.getElementById('auth-error').style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Access';
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

async function loadP() {
  document.getElementById('p-wrap').innerHTML = '<div class="loading">Loading...</div>';
  try {
    let all = [], offset = null;
    do {
      const r = await fetch(`${W}/api/records?pageSize=100${offset?'&offset='+offset:''}`);
      const d = await r.json(); all = all.concat(d.records||[]); offset = d.offset;
    } while(offset);
    PD = all.map(r => ({ id: r.id, ...r.fields })); renderP();
  } catch(e) { document.getElementById('p-wrap').innerHTML = '<div class="loading">Error loading.</div>'; }
}

async function loadC() {
  document.getElementById('c-wrap').innerHTML = '<div class="loading">Loading...</div>';
  try {
    let all = [], offset = null;
    do {
      const r = await fetch(`${W}/api/companies?pageSize=100${offset?'&offset='+offset:''}`);
      const d = await r.json(); all = all.concat(d.records||[]); offset = d.offset;
    } while(offset);
    CD = all.map(r => ({ id: r.id, ...r.fields })); renderC();
  } catch(e) { document.getElementById('c-wrap').innerHTML = '<div class="loading">Error loading.</div>'; }
}

function renderP() {
  let rows = [...PD];
  if (pFilter !== 'all') rows = rows.filter(r => r['Status'] === pFilter);
  rows.sort((a,b) => { let av=a[pSortK]||'',bv=b[pSortK]||''; return av<bv?pSortD:av>bv?-pSortD:0; });
  const w = document.getElementById('p-wrap');
  if (!rows.length) { w.innerHTML='<table><tbody><tr><td colspan="7"><div class="empty">No roles yet.</div></td></tr></tbody></table>'; }
  else {
    w.innerHTML = `<table><thead><tr>
      <th onclick="sortP('Company')">Company</th><th onclick="sortP('Status')">Status</th>
      <th onclick="sortP('Channel')">Channel</th><th onclick="sortP('Date Applied')">Date</th>
      <th>Recruiter</th><th>Next step</th><th></th>
    </tr></thead><tbody>${rows.map(r => {
      const s = PS[r['Status']]||PS['Applied'];
      const dt = r['Date Applied'] ? new Date(r['Date Applied']+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
      return `<tr>
        <td><div class="co-name">${esc(r['Company']||'')}</div><div class="sub">${esc(r['Role']||'')}${r['Salary Band']?' · '+esc(r['Salary Band']):''}</div></td>
        <td><span class="badge" style="background:${s[0]};color:${s[1]}">${esc(r['Status']||'')}</span></td>
        <td><span class="channel">${esc(r['Channel']||'')}</span></td>
        <td><span class="date-cell">${dt}</span></td>
        <td><div class="recruiter-name">${esc(r['Recruiter Name']||'')}</div><div class="recruiter-contact">${esc(r['Recruiter Contact']||'')}</div></td>
        <td><span style="font-size:12px;max-width:160px;display:block">${esc(r['Next Step']||'')}</span></td>
        <td><div class="actions">
          <button class="icon-btn" onclick="openModal('p','${r.id}')">✎</button>
          <button class="icon-btn del" onclick="delP('${r.id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }
  const now=new Date(), wa=new Date(now-7*86400000);
  document.getElementById('p-total').textContent = PD.length+' role'+(PD.length!==1?'s':'');
  document.getElementById('st-active').textContent = PD.filter(r=>!['Rejected','No answer'].includes(r['Status'])).length;
  document.getElementById('st-interview').textContent = PD.filter(r=>r['Status']==='Interview').length;
  document.getElementById('st-offer').textContent = PD.filter(r=>r['Status']==='Offer').length;
  document.getElementById('st-week').textContent = PD.filter(r=>r['Date Applied']&&new Date(r['Date Applied'])>=wa).length;
}

function renderC() {
  const q = (document.getElementById('c-search')?.value||'').toLowerCase();
  let rows = [...CD];
  if (cFilter !== 'all') rows = rows.filter(r => r['Status'] === cFilter);
  if (q) rows = rows.filter(r => (r['Company']||'').toLowerCase().includes(q)||(r['Sector']||'').toLowerCase().includes(q));
  rows.sort((a,b) => {
    if (cSortK==='Revenue') { return (parseRev(a['Revenue'])-parseRev(b['Revenue']))*cSortD; }
    let av=a[cSortK]||'',bv=b[cSortK]||''; return av<bv?cSortD:av>bv?-cSortD:0;
  });
  const w = document.getElementById('c-wrap');
  if (!rows.length) { w.innerHTML='<table><tbody><tr><td colspan="7"><div class="empty">No companies found.</div></td></tr></tbody></table>'; }
  else {
    w.innerHTML = `<table><thead><tr>
      <th onclick="sortC('Company')">Company</th><th onclick="sortC('Sector')">Sector</th>
      <th onclick="sortC('Revenue')">Revenue ↕</th><th onclick="sortC('Employees')">Employees</th>
      <th>EMEA</th><th onclick="sortC('Status')">Status</th><th></th>
    </tr></thead><tbody>${rows.map(r => {
      const s = CS[r['Status']];
      return `<tr>
        <td>
          <div class="co-name">${esc(r['Company']||'')}</div>
          ${r['Jobs URL']?`<a class="jobs-link" href="${esc(r['Jobs URL'])}" target="_blank">Jobs ↗</a>`:''}
        </td>
        <td><span class="channel">${esc(r['Sector']||'')}</span></td>
        <td><span class="revenue">${esc(r['Revenue']||'')}</span></td>
        <td><span class="sub">${esc(r['Employees']||'')}</span></td>
        <td><span class="sub">${esc(r['EMEA Presence']||'')}</span></td>
        <td>${s?`<span class="badge" style="background:${s[0]};color:${s[1]}">${esc(r['Status'])}</span>`:''}</td>
        <td><div class="actions">
          <button class="icon-btn" onclick="openModal('c','${r.id}')">✎</button>
          <button class="icon-btn del" onclick="delC('${r.id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
  }
  document.getElementById('c-total').textContent = CD.length+' companies';
  document.getElementById('c-interesting').textContent = CD.filter(r=>r['Status']==='Interesting').length;
  document.getElementById('c-contacted').textContent = CD.filter(r=>r['Status']==='Contacted').length;
}

function parseRev(s) {
  if (!s) return 0;
  const m = s.match(/([\d.]+)([BMK]?)/i);
  if (!m) return 0;
  const n=parseFloat(m[1]),u=m[2].toUpperCase();
  return u==='B'?n*1e9:u==='M'?n*1e6:u==='K'?n*1e3:n;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openModal(type, id) {
  if (type==='p') {
    pEditId = id||null;
    document.getElementById('p-modal-title').textContent = pEditId?'Edit role':'Add role';
    const r = pEditId ? PD.find(x=>x.id===pEditId) : null;
    document.getElementById('pf-company').value = r?.['Company']||'';
    document.getElementById('pf-role').value = r?.['Role']||'';
    document.getElementById('pf-status').value = r?.['Status']||'Applied';
    document.getElementById('pf-channel').value = r?.['Channel']||'LinkedIn';
    document.getElementById('pf-date').value = r?.['Date Applied']||new Date().toISOString().split('T')[0];
    document.getElementById('pf-salary').value = r?.['Salary Band']||'';
    document.getElementById('pf-rname').value = r?.['Recruiter Name']||'';
    document.getElementById('pf-rcontact').value = r?.['Recruiter Contact']||'';
    document.getElementById('pf-next').value = r?.['Next Step']||'';
    document.getElementById('pf-notes').value = r?.['Notes']||'';
    document.getElementById('p-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('pf-company').focus(),50);
  } else {
    cEditId = id||null;
    document.getElementById('c-modal-title').textContent = cEditId?'Edit company':'Add company';
    const r = cEditId ? CD.find(x=>x.id===cEditId) : null;
    document.getElementById('cf-company').value = r?.['Company']||'';
    document.getElementById('cf-sector').value = r?.['Sector']||'';
    document.getElementById('cf-revenue').value = r?.['Revenue']||'';
    document.getElementById('cf-employees').value = r?.['Employees']||'';
    document.getElementById('cf-emea').value = r?.['EMEA Presence']||'';
    document.getElementById('cf-status').value = r?.['Status']||'';
    document.getElementById('cf-jobs').value = r?.['Jobs URL']||'';
    document.getElementById('cf-notes').value = r?.['Notes']||'';
    document.getElementById('c-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('cf-company').focus(),50);
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function saveP() {
  const company=document.getElementById('pf-company').value.trim();
  const role=document.getElementById('pf-role').value.trim();
  if (!company||!role) { alert('Company and role are required.'); return; }
  const fields = {
    'Company':company,'Role':role,
    'Status':document.getElementById('pf-status').value,
    'Channel':document.getElementById('pf-channel').value,
    'Date Applied':document.getElementById('pf-date').value||null,
    'Salary Band':document.getElementById('pf-salary').value.trim(),
    'Recruiter Name':document.getElementById('pf-rname').value.trim(),
    'Recruiter Contact':document.getElementById('pf-rcontact').value.trim(),
    'Next Step':document.getElementById('pf-next').value.trim(),
    'Notes':document.getElementById('pf-notes').value.trim(),
  };
  const btn=document.getElementById('p-save-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try {
    if (pEditId) {
      const d=await (await fetch(`${W}/api/records/${pEditId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})})).json();
      PD[PD.findIndex(x=>x.id===pEditId)]={id:pEditId,...d.fields};
    } else {
      const d=await (await fetch(`${W}/api/records`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})})).json();
      PD.unshift({id:d.id,...d.fields});
    }
    renderP(); closeModal('p-overlay'); showToast(pEditId?'Entry updated':'Role added');
  } catch(e) { alert('Error saving.'); }
  btn.disabled=false; btn.textContent='Save';
}

async function delP(id) {
  if (!confirm('Remove this entry?')) return;
  await fetch(`${W}/api/records/${id}`,{method:'DELETE'});
  PD=PD.filter(x=>x.id!==id); renderP(); showToast('Entry removed');
}

async function delC(id) {
  if (!confirm('Remove this company?')) return;
  await fetch(`${W}/api/companies/${id}`,{method:'DELETE'});
  CD=CD.filter(x=>x.id!==id); renderC(); showToast('Company removed');
}

function setFilter(type,f,btn) {
  if (type==='p') { pFilter=f; document.querySelectorAll('#tab-pipeline .filter-btn').forEach(b=>b.classList.remove('active')); renderP(); }
  else { cFilter=f; document.querySelectorAll('#tab-companies .filter-btn').forEach(b=>b.classList.remove('active')); renderC(); }
  btn.classList.add('active');
}

function sortP(k) { if(pSortK===k)pSortD*=-1; else{pSortK=k;pSortD=1;} renderP(); }
function sortC(k) { if(cSortK===k)cSortD*=-1; else{cSortK=k;cSortD=-1;} renderC(); }

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal('p-overlay');closeModal('c-overlay');} });
document.getElementById('pwd-input').addEventListener('keydown',e=>{ if(e.key==='Enter')checkAuth(); });
